version: '3.8'

services:

  backend:
    build: ./backend
    container_name: infracommand-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - ENV=development
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: infracommand-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: infracommand-network
