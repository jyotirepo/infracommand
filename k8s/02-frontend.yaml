apiVersion: apps/v1
kind: Deployment
metadata:
  name: infracommand-frontend
  namespace: infracommand
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infracommand-frontend
  template:
    metadata:
      labels:
        app: infracommand-frontend
    spec:
      imagePullSecrets:
        - name: nexus-pull-secret
      containers:
        - name: frontend
          image: 192.168.1.12:8082/infracommand-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: infracommand-frontend
  namespace: infracommand
spec:
  selector:
    app: infracommand-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
