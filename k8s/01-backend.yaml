apiVersion: apps/v1
kind: Deployment
metadata:
  name: infracommand-backend
  namespace: infracommand
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infracommand-backend
  template:
    metadata:
      labels:
        app: infracommand-backend
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: infracommand-backend
      containers:
        - name: backend
          image: 192.168.101.80:8082/infracommand-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: DB_PATH
              value: /data/infracommand.db
            - name: TRIVY_SERVER_URL
              value: "http://trivy-server.infracommand.svc.cluster.local:4954"
            - name: TRIVY_SERVER_EXTERNAL_URL
              value: "http://192.168.101.80:4954"
            # ── Auth ─────────────────────────────────────────────────────
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: infracommand-auth-secret
                  key: jwt-secret
            - name: JWT_EXPIRE_HOURS
              value: "8"
            - name: APP_URL
              value: "http://192.168.101.80:32302"
            # ── SMTP (optional) ───────────────────────────────────────────────
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: infracommand-smtp-secret
                  key: smtp-host
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: infracommand-smtp-secret
                  key: smtp-port
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: infracommand-smtp-secret
                  key: smtp-user
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: infracommand-smtp-secret
                  key: smtp-pass
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: infracommand-smtp-secret
                  key: smtp-from
                  optional: true
          volumeMounts:
            - name: db-storage
              mountPath: /data
            - name: trivy-binary
              mountPath: /usr/local/bin/trivy
              readOnly: true
            - name: kubectl-binary
              mountPath: /usr/local/bin/kubectl
              readOnly: true
      volumes:
        - name: db-storage
          hostPath:
            path: /opt/infracommand/db
            type: DirectoryOrCreate
        - name: trivy-binary
          hostPath:
            path: /usr/local/bin/trivy
            type: File
        - name: kubectl-binary
          hostPath:
            path: /usr/local/bin/kubectl
            type: File
      imagePullSecrets:
        - name: nexus-pull-secret
---
apiVersion: v1
kind: Service
metadata:
  name: infracommand-backend
  namespace: infracommand
spec:
  selector:
    app: infracommand-backend
  ports:
    - port: 5000
      targetPort: 5000
