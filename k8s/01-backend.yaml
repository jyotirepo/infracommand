apiVersion: apps/v1
kind: Deployment
metadata:
  name: infracommand-backend
  namespace: infracommand
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infracommand-backend
  template:
    metadata:
      labels:
        app: infracommand-backend
    spec:
      imagePullSecrets:
        - name: nexus-pull-secret
      containers:
        - name: backend
          image: 192.168.1.12:8082/infracommand-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: infracommand-backend
  namespace: infracommand
spec:
  selector:
    app: infracommand-backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
