# ── Trivy Server — infracommand namespace ────────────────────────────────────
#
# WHAT THIS FILE DOES:
#   Deploys a self-contained Trivy vulnerability scanner inside the
#   infracommand namespace. Zero dependency on any other namespace.
#
# HOW THE CVE DATABASE WORKS:
#   Jenkins mirrors trivy-db from ghcr.io → Nexus :8083 (stage 9)
#   trivy-server pulls the DB from Nexus :8083 on startup (no internet needed)
#   DB is refreshed every time the Jenkins pipeline runs
#
# HOW SCANNING WORKS:
#   Backend SSHes into target host, copies trivy binary via SFTP if missing,
#   then runs: trivy rootfs --server http://192.168.101.80:31954 /
#   NodePort :31954 makes trivy-server reachable from outside the cluster.
#   NO trivy installation needed on target hosts — auto-deployed on first scan.
#
# OFFLINE MODE:
#   Set TRIVY_SKIP_DB_UPDATE = "true" in ConfigMap to use cached DB only.
#
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. ConfigMap ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-config
  namespace: infracommand
data:
  TRIVY_DB_REPOSITORY:       "192.168.101.80:8083/trivy-db"
  TRIVY_JAVA_DB_REPOSITORY:  "192.168.101.80:8083/trivy-java-db"
  TRIVY_LISTEN:              "0.0.0.0:4954"
  TRIVY_CACHE_DIR:           "/var/trivy-cache"
  TRIVY_NO_PROGRESS:         "true"
  TRIVY_SKIP_DB_UPDATE:      "false"
  TRIVY_SKIP_CHECK_UPDATE:   "false"

---
# ── 2. Deployment ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-server
  namespace: infracommand
  labels:
    app: trivy-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trivy-server
  # Recreate: kill old pod before starting new one.
  # Required — trivy locks the DB cache dir exclusively.
  # Two pods sharing the same hostPath = CrashLoopBackOff.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: trivy-server
    spec:
      containers:
        - name: trivy-server
          image: aquasec/trivy:latest
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --listen
            - "0.0.0.0:4954"
            - --cache-dir
            - /var/trivy-cache
          envFrom:
            - configMapRef:
                name: trivy-config
          ports:
            - name: trivy
              containerPort: 4954
              protocol: TCP
          resources:
            requests:
              cpu:    "200m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: trivy-cache
              mountPath: /var/trivy-cache
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4954
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4954
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: trivy-cache
          hostPath:
            path: /opt/infracommand/trivy-cache
            type: DirectoryOrCreate

---
# ── 3. Service — NodePort ─────────────────────────────────────────────────────
# ClusterIP :4954 for backend pod (internal)
# NodePort :31954 for target hosts outside the cluster
apiVersion: v1
kind: Service
metadata:
  name: trivy-server
  namespace: infracommand
  labels:
    app: trivy-server
spec:
  selector:
    app: trivy-server
  ports:
    - name: trivy
      port: 4954
      targetPort: 4954
      nodePort: 31954
      protocol: TCP
  type: NodePort
