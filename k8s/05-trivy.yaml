# ── Trivy Server — infracommand namespace ────────────────────────────────────
#
# WHAT THIS FILE DOES:
#   Deploys a self-contained Trivy vulnerability scanner inside the
#   infracommand namespace. Zero dependency on any other namespace.
#
# HOW THE CVE DATABASE WORKS:
#   Jenkins (has internet) mirrors trivy-db from ghcr.io → Nexus :8083
#   trivy-server pod pulls the DB from Nexus :8083 (no internet needed)
#   DB is updated every time the Jenkins pipeline runs (stage 9)
#
# REPOS:
#   App images  → Nexus :8082  (infracommand-docker repo)  ← unchanged
#   Trivy DB    → Nexus :8083  (aquasecurity repo)         ← separate, new
#
# OFFLINE / AIR-GAP MODE:
#   Set TRIVY_SKIP_DB_UPDATE = "true" in ConfigMap below.
#   trivy-server will use the last cached DB from the hostPath volume.
#   Run the Jenkins pipeline from a machine with internet to refresh.
#
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. ConfigMap — all trivy-server settings in one place ────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-config
  namespace: infracommand
data:
  # Pull CVE DB from the dedicated aquasecurity Nexus repo (:8083)
  # Jenkins mirrors ghcr.io/aquasecurity/trivy-db → :8083 on every build
  TRIVY_DB_REPOSITORY:       "192.168.101.80:8083/trivy-db"
  TRIVY_JAVA_DB_REPOSITORY:  "192.168.101.80:8083/trivy-java-db"
  TRIVY_LISTEN:              "0.0.0.0:4954"
  TRIVY_CACHE_DIR:           "/var/trivy-cache"
  TRIVY_NO_PROGRESS:         "true"
  # Flip both to "true" for full offline mode (no download, use cached DB only)
  TRIVY_SKIP_DB_UPDATE:      "false"
  TRIVY_SKIP_CHECK_UPDATE:   "false"

---
# ── 2. Deployment ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-server
  namespace: infracommand
  labels:
    app: trivy-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trivy-server
  # Recreate strategy: kill the old pod BEFORE starting the new one.
  # Required because trivy places an exclusive lock on the DB cache directory.
  # Two pods sharing the same hostPath cache = CrashLoopBackOff on the new pod.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: trivy-server
    spec:
      # Install sshpass + ssh client so trivy-server can SSH into target hosts
      # for remote rootfs scanning (no trivy binary needed on target hosts)
      initContainers:
        - name: install-ssh-tools
          image: aquasec/trivy:latest
          command:
            - /bin/sh
            - -c
            - |
              apt-get update -qq 2>/dev/null &&               apt-get install -y -qq openssh-client sshpass 2>/dev/null ||               (apk add --no-cache openssh-client sshpass 2>/dev/null) ||               echo "SSH tools install attempted"
              cp /usr/bin/sshpass /shared/sshpass 2>/dev/null || true
              cp /usr/bin/ssh     /shared/ssh     2>/dev/null || true
          volumeMounts:
            - name: shared-tools
              mountPath: /shared
      containers:
        - name: trivy-server
          image: aquasec/trivy:latest
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --listen
            - "0.0.0.0:4954"
            - --cache-dir
            - /var/trivy-cache
          # All config comes from the ConfigMap — change values there, not here
          envFrom:
            - configMapRef:
                name: trivy-config
          ports:
            - name: trivy
              containerPort: 4954
              protocol: TCP
          resources:
            requests:
              cpu:    "200m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: trivy-cache
              mountPath: /var/trivy-cache
          # 30s delay — DB download from Nexus takes ~20-30s on first start
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4954
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4954
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: trivy-cache
          hostPath:
            # DB persists across pod restarts — no re-download on every restart
            path: /opt/infracommand/trivy-cache
            type: DirectoryOrCreate

---
# ── 3. Service ────────────────────────────────────────────────────────────────
# NodePort so target hosts (KVM hypervisors, VMs) can call trivy-server
# directly for rootfs scanning: trivy rootfs --server http://192.168.101.80:31954
apiVersion: v1
kind: Service
metadata:
  name: trivy-server
  namespace: infracommand
  labels:
    app: trivy-server
spec:
  selector:
    app: trivy-server
  ports:
    - name: trivy
      port: 4954
      targetPort: 4954
      nodePort: 31954        # Fixed NodePort — reachable from any host on the network
      protocol: TCP
  type: NodePort
