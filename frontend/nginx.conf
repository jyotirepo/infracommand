server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the API reference page at /api-docs
    location = /api-docs {
        alias /usr/share/nginx/html/infracommand-swagger.html;
        add_header Content-Type text/html;
    }

    location / { try_files $uri $uri/ /index.html; }

    location /api/ {
        proxy_pass http://infracommand-backend:5000/api/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
}
