server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect /api-docs to the direct FastAPI Swagger UI
    location = /api-docs {
        return 302 /api/docs;
    }

    # OpenAPI JSON spec
    location = /api/openapi.json {
        proxy_pass http://infracommand-backend:5000/api/openapi.json;
        proxy_set_header Host $host;
    }

    # All API calls including /api/docs Swagger UI
    location /api/ {
        proxy_pass http://infracommand-backend:5000/api/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
