server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API docs — serve the static HTML file directly
    location = /api-docs {
        default_type text/html;
        try_files /infracommand-swagger.html =404;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://infracommand-backend:5000/api/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # React app — catch-all (must be last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
